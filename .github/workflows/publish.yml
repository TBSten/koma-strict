# Maven Central への publish (cream の publish.yml をそのまま踏襲 + wrapper 検証 / konan cache /
# timeout を追加)。トリガは「GitHub Release を publish したとき」= タグ push ではない。
name: Publish

on:
  release:
    # `published` は full release / pre-release の両方で発火する唯一の type。
    # `prereleased` は draft からの pre-release で発火せず、`released` は pre-release で発火しない。
    # 参考: docs/en/actions/.../events-that-trigger-workflows#release
    types: [ published ]
  workflow_dispatch:

# publish 中の多重起動は避けたいが、走っている publish はキャンセルしない。
concurrency:
  group: publish
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  publish:
    name: Release build and publish
    # 全 KMP ターゲット (Apple native 含む) を publish するため macOS runner。
    runs-on: macos-latest
    timeout-minutes: 90
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Cache Kotlin/Native (konan)
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      # publishAndReleaseToMavenCentral 一発で staging → Central Portal 自動リリースまで。
      # gradle.properties で configuration-cache を有効化しているため publish 時のみ無効化する。
      - name: Publish to Maven Central
        run: ./gradlew publishAndReleaseToMavenCentral --no-configuration-cache --stacktrace
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}
