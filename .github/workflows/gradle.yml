# CI: 各ターゲットを OS 最小構成でビルド/テストする (cream の gradle.yml を koma-strict の
# 実タスク名に合わせて再構成 + concurrency/timeout/最新 action へ更新したもの)。
#
# cream との差分:
#   - cream の matrix (linuxX64Test / testDebug|ReleaseUnitTest) は koma-strict に該当タスクが無い。
#     koma-strict は Android を新しい com.android.kotlin.multiplatform.library で構成しており
#     host unit test task を持たないため、Android は assembleAndroidMain (AAR compile) で担保する。
#   - ktlint は未導入のため ktlint ジョブは無し。
#   - concurrency (cancel-in-progress) と timeout-minutes を追加。action は v4 世代へ統一。
name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_call:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # KSP processor の snapshot テスト (生成コードの正しさ = 本丸)
          - { name: "ksp processor", tasks: "test", os: ubuntu-latest }
          # runtime / ksp:shared の JVM 振る舞いテスト
          - { name: "jvm", tasks: ":koma-strict-runtime:jvmTest :koma-strict-ksp:shared:jvmTest", os: ubuntu-latest }
          # integrationTest: 実物 koma (Maven Central) に対する生成コードの E2E テスト。
          # jvmTest 集約でも走るが、独立した CI チェックとして可視化し集約から取りこぼさないよう明示する。
          - { name: "integration test", tasks: ":integrationTest:jvmTest", os: ubuntu-latest }
          # runtime / ksp:shared の JS・Wasm main コンパイル (browser test は karma 依存で不安定なため compile のみ)
          - { name: "js / wasm", tasks: "compileKotlinJs compileKotlinWasmJs", os: ubuntu-latest }
          # runtime の Android AAR コンパイル
          - { name: "android", tasks: "assembleAndroidMain", android: true, os: ubuntu-latest }
          # iosSimulatorArm64 のテスト実行 + iosArm64 (device) klib コンパイル
          - { name: "ios", tasks: "iosSimulatorArm64Test compileKotlinIosArm64", konan: true, os: macos-latest }
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Validate Gradle Wrapper
        uses: gradle/actions/wrapper-validation@v4

      # JDK 21 を runtime に据え、jvmToolchain(17) は foojay-resolver-convention が自動プロビジョニングする。
      # CI と publish.yml で JDK 21 に統一している (cream の CI17/publish21 の不一致を解消)。
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Android SDK
        if: ${{ matrix.android }}
        uses: android-actions/setup-android@v3

      - name: Cache Kotlin/Native (konan)
        if: ${{ matrix.konan }}
        uses: actions/cache@v4
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: |
            konan-${{ runner.os }}-

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: ./gradlew ${{ matrix.tasks }}
        run: ./gradlew ${{ matrix.tasks }} --stacktrace
